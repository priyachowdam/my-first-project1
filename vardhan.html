<!DOCTYPE html>
<html>
<head>
  <title>My Mobile Location</title>
</head>
<body>
  <h2>Track My Location</h2>
  <button onclick="getLocation()">Get Location</button>
  <p id="output"></p>

  <script>
    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition, showError);
      } else {
        document.getElementById("output").innerHTML = "Geolocation not supported.";
      }
    }

    function showPosition(position) {
      document.getElementById("output").innerHTML =
        "Latitude: " + position.coords.latitude +
        "<br>Longitude: " + position.coords.longitude;
    }

    function showError(error) {
      switch(error.code) {
        case error.PERMISSION_DENIED:
          document.getElementById("output").innerHTML = "User denied location request.";
          break;
        case error.POSITION_UNAVAILABLE:
          document.getElementById("output").innerHTML = "Location unavailable.";
          break;
        case error.TIMEOUT:
          document.getElementById("output").innerHTML = "Request timed out.";
          break;
        default:
          document.getElementById("output").innerHTML = "Unknown error.";
      }
    }
  </script>
</body>
</html>
